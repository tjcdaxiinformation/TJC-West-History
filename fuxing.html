<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>復興小區 - 宣道歷史收集</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; scroll-behavior: smooth; }
        .church-card { transition: all 0.3s ease; }
        .church-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .loader { border: 2px solid #f3f3f3; border-top: 2px solid #3498db; border-radius: 50%; width: 14px; height: 14px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .section-title { border-left: 5px solid #10b981; padding-left: 1rem; }
    </style>
</head>
<body class="py-10 px-4">

    <div class="max-w-6xl mx-auto">
        <!-- 頂部導覽 -->
        <div class="mb-8 flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
            <a href="index.html" class="flex items-center text-blue-600 hover:text-blue-800 font-medium transition text-lg">
                <i class="fas fa-home mr-2"></i>回到首頁
            </a>
            <span id="update-status" class="text-sm font-medium text-gray-500 bg-gray-50 px-4 py-1 rounded-full">
                <span class="loader mr-2"></span>正在同步雲端狀態...
            </span>
        </div>

        <header class="text-center mb-16">
            <h1 class="text-4xl font-extrabold text-gray-900 mb-4 tracking-tight tracking-tight">🕊️ 宣道歷史收集：復興小區</h1>
            <p class="text-gray-600 text-lg max-w-2xl mx-auto italic">
                「傳承信仰，記錄恩典」— 整合前山、中山與後山牧區之數位典藏入口
            </p>
        </header>

        <!-- 1. 前山牧區 -->
        <section class="mb-16">
            <h3 class="text-2xl font-bold text-gray-800 mb-8 section-title text-gray-800">📍 前山牧區</h3>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6" id="qianshan-list">
                <!-- 由 JS 自動產生卡片 -->
            </div>
        </section>

        <!-- 2. 中山牧區 -->
        <section class="mb-16">
            <h3 class="text-2xl font-bold text-gray-800 mb-8 section-title text-gray-800" style="border-left-color: #3b82f6;">📍 中山牧區</h3>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6" id="zhongshan-list">
                <!-- 由 JS 自動產生卡片 -->
            </div>
        </section>

        <!-- 3. 後山牧區 -->
        <section class="mb-16">
            <h3 class="text-2xl font-bold text-gray-800 mb-8 section-title text-gray-800" style="border-left-color: #f59e0b;">📍 後山牧區</h3>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6" id="houshan-list">
                <!-- 由 JS 自動產生卡片 -->
            </div>
        </section>

        <footer class="text-center mt-20 text-gray-400 pb-12 border-t pt-8">
            <p class="font-medium mb-1 text-gray-600 text-sm">真耶穌教會台灣傳教百年115西區音樂會籌備會公關宣傳小組</p>
            <p class="text-xs uppercase tracking-widest">&copy; 2026 TJC West District Missionary History Project</p>
        </footer>
    </div>

    <script>
        /**
         * ⚙️ 核心設定區
         */
        // 1. 您的 Google 表單 ID
        const FORM_ID = '1FAIpQLScJonO-Dyv_nu_iLnms_gIswddQIN8THuuFfalLoHivc76W2Q'; 

        // 2. 您的「教會名稱」欄位代號
        const ENTRY_ID = 'entry.974815491'; 

        // 3. 您的 API URL
        const API_URL = 'https://script.google.com/macros/s/AKfycbzb4Hp2YBHCK2VcWkVmr8enooLLksNcJOnd98frV-O-jr_quonp3huNhTectJDIxZUEAQ/exec';

        // 復興小區教會清單
        const districts = {
            qianshan: { color: 'emerald', churches: ['八德', '崎頂', '大溪', '復興'] },
            zhongshan: { color: 'blue', churches: ['義盛', '大灣', '雪霧鬧'] },
            houshan: { color: 'amber', churches: ['上巴陵', '中巴陵', '三光', '光華'] }
        };

        function initChurches() {
            Object.keys(districts).forEach(key => {
                const zone = districts[key];
                const container = document.getElementById(`${key}-list`);
                
                zone.churches.forEach(name => {
                    /**
                     * 💡 修正說明：
                     * 加入 continue_draft=false 強制不載入草稿資料。
                     * 並將 usp=pp_url 放在最前面以符合標準格式。
                     */
                    const uploadUrl = `https://docs.google.com/forms/d/e/${FORM_ID}/viewform?usp=pp_url&${ENTRY_ID}=${encodeURIComponent(name)}&continue_draft=false`;
                    
                    const card = document.createElement('div');
                    card.className = "bg-white p-6 rounded-3xl border border-gray-100 church-card shadow-sm";
                    card.setAttribute('data-church', name);
                    card.innerHTML = `
                        <h5 class="text-xl font-bold text-gray-800 mb-2">${name}教會</h5>
                        <div class="status-badge text-sm mb-6 text-orange-500 font-medium" data-status-for="${name}">⏳ 檢查狀態中</div>
                        <a href="${uploadUrl}" target="_blank" class="block w-full py-3 bg-${zone.color}-600 text-white text-center rounded-xl font-bold hover:bg-${zone.color}-700 transition shadow-md">上傳資料</a>
                    `;
                    container.appendChild(card);
                });
            });
        }

        async function fetchStatus() {
            const statusLabel = document.getElementById('update-status');
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('API 無法存取');
                const data = await response.json();
                const submittedList = data.submitted || [];

                document.querySelectorAll('[data-status-for]').forEach(badge => {
                    const name = badge.getAttribute('data-status-for');
                    if (submittedList.includes(name)) {
                        badge.innerHTML = '<i class="fas fa-check-circle mr-1"></i>已收件';
                        badge.classList.remove('text-orange-500');
                        badge.classList.add('text-green-600', 'font-bold');
                        badge.closest('.church-card').classList.add('border-green-200', 'bg-green-50/20');
                    } else {
                        badge.innerHTML = '⏳ 待繳交';
                    }
                });
                statusLabel.innerHTML = `<i class="fas fa-sync-alt text-green-500 mr-2"></i>同步成功`;
            } catch (e) {
                console.error(e);
                statusLabel.innerHTML = `<i class="fas fa-exclamation-triangle text-red-500 mr-2"></i>狀態同步失敗`;
            }
        }

        window.onload = () => {
            initChurches();
            fetchStatus();
        };
    </script>
</body>
</html>
